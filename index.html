<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>益田川 鮎ルアーガイド | QR連携マップ サンプル</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --river-deep:   #1f4a52;
    --river-mid:    #3d7a82;
    --stone:        #eae6da;
    --stone-dark:   #cfc9b6;
    --moss:         #52683f;
    --ayu-orange:   #d97b3f;
    --ink:          #24302c;
    --paper:        #f7f5ee;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--paper);color:var(--ink);font-family:'Noto Sans JP',sans-serif;}

  .app{display:flex;flex-direction:column;height:100vh;min-height:640px;}

  header{
    background:linear-gradient(120deg,var(--river-deep),var(--river-mid));
    color:var(--paper);
    padding:18px 24px 16px;
    display:flex;
    align-items:baseline;
    gap:14px;
    flex-wrap:wrap;
    border-bottom:4px solid var(--ayu-orange);
  }
  header h1{
    font-family:'Shippori Mincho',serif;
    font-weight:700;
    font-size:22px;
    margin:0;
    letter-spacing:.04em;
  }
  header .sub{
    font-size:12px;
    opacity:.85;
    letter-spacing:.08em;
  }

  .layout{flex:1;display:flex;min-height:0;}
  #map{flex:1;min-width:0;}

  .panel{
    width:340px;
    flex-shrink:0;
    background:var(--paper);
    border-left:1px solid var(--stone-dark);
    overflow-y:auto;
    display:flex;
    flex-direction:column;
  }
  .panel-head{
    padding:16px 18px 10px;
    border-bottom:1px solid var(--stone-dark);
  }
  .panel-head h2{
    font-family:'Shippori Mincho',serif;
    font-size:16px;
    margin:0 0 4px;
  }
  .panel-head p{
    font-size:12px;
    line-height:1.6;
    color:#5a5a52;
    margin:0;
  }

  .spot-list{list-style:none;margin:0;padding:8px;}
  .spot-item{
    display:flex;
    gap:10px;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s ease, border-color .15s ease;
    align-items:center;
  }
  .spot-item:hover{background:var(--stone);}
  .spot-item.active{
    background:#fff;
    border-color:var(--ayu-orange);
    box-shadow:0 1px 4px rgba(0,0,0,.08);
  }
  .spot-badge{
    width:26px;height:26px;border-radius:50%;
    background:var(--moss);color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;flex-shrink:0;
  }
  .spot-item.active .spot-badge{background:var(--ayu-orange);}
  .spot-text .name{font-size:13px;font-weight:700;line-height:1.4;}
  .spot-text .river{font-size:11px;color:var(--river-mid);}

  .qr-block{
    margin-top:auto;
    padding:16px 18px;
    border-top:1px solid var(--stone-dark);
    background:var(--stone);
  }
  .qr-block h3{
    font-size:12px;
    margin:0 0 8px;
    letter-spacing:.04em;
  }
  .qr-row{display:flex;gap:10px;align-items:center;}
  .qr-row img{width:64px;height:64px;background:#fff;border:1px solid var(--stone-dark);border-radius:4px;}
  .qr-row .url{
    font-size:10px;
    word-break:break-all;
    color:#5a5a52;
    line-height:1.5;
    flex:1;
  }

  .leaflet-popup-content-wrapper{
    border-radius:10px;
    font-family:'Noto Sans JP',sans-serif;
  }
  .popup-title{font-weight:700;font-size:13px;margin:0 0 4px;}
  .popup-body{font-size:12px;line-height:1.6;margin:0;}
  .popup-tags{margin-top:6px;font-size:11px;color:var(--river-mid);}

  @media (max-width:760px){
    .layout{flex-direction:column;}
    .panel{width:100%;height:38%;border-left:none;border-top:1px solid var(--stone-dark);}
    #map{height:62%;}
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <h1>益田川 鮎ルアーガイド</h1>
    <span class="sub">QRコード → ポイント自動フォーカス マップ デモ</span>
  </header>

  <div class="layout">
    <div id="map"></div>

    <div class="panel">
      <div class="panel-head">
        <h2>ポイント一覧</h2>
        <p>QRを読み取ると <code>?point=ID</code> 付きのURLが開き、該当ピンへ自動移動＋説明を表示します。下のリストをクリックしても同じ挙動を確認できます。</p>
      </div>
      <ul class="spot-list" id="spotList"></ul>
      <div class="qr-block">
        <h3>選択中ポイントのQR（デモ用に自動生成）</h3>
        <div class="qr-row">
          <img id="qrImg" src="" alt="QRコード">
          <div class="url" id="qrUrl">—</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ===================== ポイントデータ =====================
   実運用では緯度経度をマイマップ上の実ピン位置に合わせてください。
   id は各QRコードのURLパラメータ ?point=id と対応します。 */
const SPOTS = [
  {
    id: "kosaka",
    name: "支流「小坂川」道の駅前",
    river: "小坂川",
    lat: 35.9330, lng: 137.2650,
    desc: "御嶽の恵みに育まれた鮎を釣りに。道の駅からすぐ、トイレも食事処も近い安心感。",
    tags: "駐車場有・トイレ有・初心者向き"
  },
  {
    id: "kyowabashi",
    name: "大洞川　共和橋",
    river: "大洞川",
    lat: 35.9020, lng: 137.2430,
    desc: "釣りも、川遊びも楽しめる。近隣にキャンプ場あり、川遊びできるスポットも点在。",
    tags: "舗装駐車場有・初心者向き"
  },
  {
    id: "lawson",
    name: "竹原川　ローソン前",
    river: "竹原川",
    lat: 35.8520, lng: 137.2280,
    desc: "川で出会える、おいしい鮎。鮎の美味しさ・美しさの品評会「鮎グランプリ」の鮎が釣れる。",
    tags: "舗装駐車場有・コンビニ有・初心者向き"
  },
  {
    id: "yamanokuchi",
    name: "支流「山之口川」郵便局前",
    river: "山之口川",
    lat: 35.8300, lng: 137.2400,
    desc: "静寂と透明度、山里の清流に浸る。抜群の透明度と豊かな自然、静かに川と向き合いたい人のためのフィールド。",
    tags: "駐車場有・トイレ有（車で2分）・初心者向き"
  },
  {
    id: "kumiai",
    name: "飛騨川　漁協事務所前",
    river: "飛騨川",
    lat: 35.7980, lng: 137.2120,
    desc: "本流の開放感、大鮎の舞台。飛騨川本流ならではの開放的な眺望。大型の鮎が期待できる。",
    tags: "舗装駐車場有・トイレ有・コンビニ有"
  },
  {
    id: "tanojiri",
    name: "門和佐川　田之尻橋",
    river: "門和佐川",
    lat: 35.7480, lng: 137.1920,
    desc: "日本の原風景の中で、鮎を釣る。橋の上から覗くと、鮎が泳ぐ姿がはっきり見える透明度。",
    tags: "駐車場有・トイレ有（車で2分）・初心者向き"
  }
];

/* ===================== 地図初期化 ===================== */
const map = L.map('map', { scrollWheelZoom: true }).setView([35.83, 137.22], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 18
}).addTo(map);

function makeIcon(active){
  return L.divIcon({
    className: '',
    html: `<div style="
      width:26px;height:26px;border-radius:50% 50% 50% 0;
      background:${active ? '#d97b3f' : '#1f4a52'};
      transform:rotate(-45deg);
      border:2px solid #fff;
      box-shadow:0 1px 4px rgba(0,0,0,.35);
    "></div>`,
    iconSize: [26,26],
    iconAnchor: [13,26],
    popupAnchor: [0,-24]
  });
}

const markers = {};
SPOTS.forEach(spot => {
  const marker = L.marker([spot.lat, spot.lng], { icon: makeIcon(false) }).addTo(map);
  marker.bindPopup(
    `<p class="popup-title">${spot.name}</p>
     <p class="popup-body">${spot.desc}</p>
     <p class="popup-tags">${spot.tags}</p>`
  );
  marker.on('click', () => selectSpot(spot.id, false));
  markers[spot.id] = marker;
});

/* ===================== 右パネルのリスト生成 ===================== */
const listEl = document.getElementById('spotList');
SPOTS.forEach((spot, i) => {
  const li = document.createElement('li');
  li.className = 'spot-item';
  li.dataset.id = spot.id;
  li.innerHTML = `
    <div class="spot-badge">${i+1}</div>
    <div class="spot-text">
      <div class="name">${spot.name}</div>
      <div class="river">${spot.river}</div>
    </div>`;
  li.addEventListener('click', () => selectSpot(spot.id, true));
  listEl.appendChild(li);
});

/* ===================== 選択状態の反映 ===================== */
function selectSpot(id, flyToIt){
  const spot = SPOTS.find(s => s.id === id);
  if(!spot) return;

  // ピンの見た目更新
  Object.entries(markers).forEach(([sid, m]) => {
    m.setIcon(makeIcon(sid === id));
  });

  // リストのハイライト更新
  document.querySelectorAll('.spot-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  if(flyToIt){
    map.flyTo([spot.lat, spot.lng], 15, { duration: 0.8 });
  }
  markers[id].openPopup();

  updateQrPreview(spot);

  // URLを書き換え（ブラウザ履歴を汚さないreplaceState）
  const url = new URL(window.location.href);
  url.searchParams.set('point', id);
  window.history.replaceState({}, '', url);
}

function updateQrPreview(spot){
  const url = new URL(window.location.href);
  url.searchParams.set('point', spot.id);
  const fullUrl = url.toString();
  document.getElementById('qrUrl').textContent = fullUrl;
  document.getElementById('qrImg').src =
    'https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=' + encodeURIComponent(fullUrl);
}

/* ===================== 初期表示：URLパラメータを読む ===================== */
const params = new URLSearchParams(window.location.search);
const initialId = params.get('point');

if(initialId && markers[initialId]){
  selectSpot(initialId, true);
} else {
  // パラメータが無ければ全体表示＋先頭ポイントをプレビュー
  const bounds = L.latLngBounds(SPOTS.map(s => [s.lat, s.lng]));
  map.fitBounds(bounds.pad(0.2));
  updateQrPreview(SPOTS[0]);
}
</script>
</body>
</html>
