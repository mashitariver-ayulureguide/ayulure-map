
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>益田川 鮎ルアーガイド</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --river-deep:   #1f4a52;
    --river-mid:    #3d7a82;
    --stone:        #eae6da;
    --stone-dark:   #cfc9b6;
    --moss:         #52683f;
    --ayu-orange:   #d97b3f;
    --ink:          #24302c;
    --paper:        #f7f5ee;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--paper);color:var(--ink);font-family:'Noto Sans JP',sans-serif;}

  .app{display:flex;flex-direction:column;height:100vh;height:100dvh;min-height:480px;}

  header{
    background:linear-gradient(120deg,var(--river-deep),var(--river-mid));
    color:var(--paper);
    padding:18px 24px 16px;
    display:flex;
    align-items:baseline;
    gap:14px;
    flex-wrap:wrap;
    border-bottom:4px solid var(--ayu-orange);
  }
  header h1{
    font-family:'Shippori Mincho',serif;
    font-weight:700;
    font-size:22px;
    margin:0;
    letter-spacing:.04em;
  }
  header h1 a{
    color:inherit;
    text-decoration:none;
  }
  header h1 a:hover{ opacity:.85; }
  header .sub{
    font-size:13px;
    opacity:.9;
    letter-spacing:.06em;
    color:var(--paper);
    text-decoration:underline;
    text-underline-offset:3px;
  }
  header .sub:hover{ opacity:1; }

  .layout{flex:1;display:flex;min-height:0;}
  #map{flex:1;min-width:0;min-height:320px;}

  .panel{
    width:340px;
    flex-shrink:0;
    background:var(--paper);
    border-left:1px solid var(--stone-dark);
    display:flex;
    flex-direction:column;
    position:relative;
    overflow:hidden;
  }
  .panel::after{
    content:'';
    position:absolute;
    left:0; right:0; bottom:0;
    height:28px;
    background:linear-gradient(to bottom, rgba(247,245,238,0), var(--paper) 85%);
    pointer-events:none;
  }
  .panel-head{
    flex-shrink:0;
    padding:20px 18px 14px;
    border-bottom:1px solid var(--stone-dark);
  }
  .panel-head h2{
    font-family:'Shippori Mincho',serif;
    font-size:26px;
    font-weight:700;
    letter-spacing:.03em;
    margin:0;
    color:var(--river-deep);
  }

  .spot-list{list-style:none;margin:0;padding:8px;padding-bottom:28px;flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .spot-item{
    display:flex;
    gap:10px;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
    border:1px solid transparent;
    transition:background .15s ease, border-color .15s ease;
    align-items:center;
  }
  .spot-item:hover{background:var(--stone);}
  .spot-item.active{
    background:#fff;
    border-color:var(--ayu-orange);
    box-shadow:0 1px 4px rgba(0,0,0,.08);
  }
  .spot-badge{
    width:26px;height:26px;border-radius:50%;
    background:var(--moss);color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;flex-shrink:0;
  }
  .spot-item.active .spot-badge{background:var(--ayu-orange);}
  .spot-text .name{font-size:14px;font-weight:700;line-height:1.5;}

  .leaflet-popup-content-wrapper{
    border-radius:10px;
    font-family:'Noto Sans JP',sans-serif;
  }
  .popup-title{font-weight:700;font-size:13px;margin:0 0 4px;}
  .popup-body{font-size:12px;line-height:1.6;margin:0;}
  .popup-tags{margin-top:6px;font-size:11px;color:var(--river-mid);}
  .popup-links{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:10px;
  }
  .popup-pdf-link,
  .popup-maps-link,
  .popup-home-link{
    display:inline-block;
    padding:6px 10px;
    font-size:11px;
    font-weight:700;
    text-decoration:none;
    border-radius:5px;
    white-space:nowrap;
  }
  .popup-pdf-link{
    background:var(--ayu-orange);
    color:#fff !important;
  }
  .popup-maps-link{
    background:var(--river-mid);
    color:#fff !important;
  }
  .popup-home-link{
    background:transparent;
    color:var(--river-deep) !important;
    border:1px solid var(--stone-dark);
  }
  .popup-pdf-link:hover,
  .popup-maps-link:hover,
  .popup-home-link:hover{ opacity:.8; }
  .popup-image{
    display:block;
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:6px;
    margin:-4px -4px 8px;
    width:calc(100% + 8px);
  }

  @media (max-width:760px){
    .layout{flex-direction:column;min-height:0;}
    .panel{width:100%;height:38%;min-height:0;border-left:none;border-top:1px solid var(--stone-dark);}
    #map{height:62%;flex:none;min-height:0;}
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <h1><a href="https://mashitariver-ayulureguide.github.io/ayulure-map/">益田川 鮎ルアーガイド</a></h1>
    <a class="sub" href="https://www.mashitagawa.jp/" target="_blank" rel="noopener noreferrer">益田川漁業協同組合</a>
  </header>

  <div class="layout">
    <div id="map"></div>

    <div class="panel">
      <div class="panel-head">
        <h2>ポイント一覧</h2>
      </div>
      <ul class="spot-list" id="spotList"></ul>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ===================== ポイントデータ =====================
   実運用では緯度経度をマイマップ上の実ピン位置に合わせてください。
   id は各QRコードのURLパラメータ ?point=id と対応します。 */
const SPOTS = [
  {
    id: "hanamomo",
    name: "小坂川（支流）道の駅はなもも前",
    river: "小坂川",
    lat: 35.9315092, lng: 137.2948095,
    image: "hanamomo.jpg",
    pdf: "hanamomo.pdf",
    desc: "御嶽の恵みに育まれた鮎を釣りに。道の駅からすぐ、トイレも食事処も近い安心感。",
    tags: "駐車場有・トイレ有・初心者向き"
  },
  {
    id: "kyowabashi",
    name: "大洞川（支流）共和橋",
    river: "大洞川",
    lat: 35.9215159, lng: 137.3091557,
    image: "kyowabashi.jpg",
    pdf: "kyowabashi.pdf",
    desc: "釣りも、川遊びも楽しめる。近隣にキャンプ場あり、川遊びできるスポットも点在。",
    tags: "舗装駐車場有・初心者向き"
  },
  {
    id: "lawson",
    name: "竹原川（支流）ローソン前",
    river: "竹原川",
    lat: 35.7653959, lng: 137.2870686,
    image: "lawson.jpg",
    pdf: "lawson.pdf",
    desc: "川で出会える、おいしい鮎。鮎の美味しさ・美しさの品評会「鮎グランプリ」の鮎が釣れる。",
    tags: "舗装駐車場有・コンビニ有・初心者向き"
  },
  {
    id: "yamayuubin",
    name: "山之口川（支流）郵便局前",
    river: "山之口川",
    lat: 35.9684801, lng: 137.1960171,
    image: "yamayuubin.jpg",
    pdf: "yamayuubin.pdf",
    desc: "静寂と透明度、山里の清流に浸る。抜群の透明度と豊かな自然、静かに川と向き合いたい人のためのフィールド。",
    tags: "駐車場有・トイレ有（車で2分）・初心者向き"
  },
  {
    id: "kumiaimae",
    name: "飛騨川　漁協事務所前",
    river: "飛騨川",
    lat: 35.8807575, lng: 137.2068935,
    image: "kumiaimae.jpg",
    pdf: "kumiaimae.pdf",
    desc: "本流の開放感、大鮎の舞台。飛騨川本流ならではの開放的な眺望。大型の鮎が期待できる。",
    tags: "舗装駐車場有・トイレ有・コンビニ有"
  },
  {
    id: "tanosiri",
    name: "門和佐川（支流）田之尻橋",
    river: "門和佐川",
    lat: 35.7131178, lng: 137.2077537,
    image: "tanosiri.jpg",
    pdf: "tanosiri.pdf",
    desc: "日本の原風景の中で、鮎を釣る。橋の上から覗くと、鮎が泳ぐ姿がはっきり見える透明度。",
    tags: "駐車場有・トイレ有（車で2分）・初心者向き"
  },
  {
    id: "sankoh",
    name: "門和佐川（支流）三光橋",
    river: "門和佐川",
    lat: 35.7155981, lng: 137.2068537,
    image: "sankoh.jpg",
    pdf: "sankoh.pdf",
    desc: "鮎ルアー向きの区間「三光橋」。駐車スペースは、橋の下流側に5台程度停めることが可能。",
    tags: "駐車場有・トイレ有（車で2分）・初心者向き"
  },
  {
    id: "wasaground",
    name: "門和佐川（支流）和佐グラウンド",
    river: "門和佐川",
    lat: 35.7180191, lng: 137.2048497,
    image: "wasaground.jpg",
    pdf: "wasaground.pdf",
    desc: "2025年に鮎ルアーイベントの会場にもなった。駐車スペース多数、公衆トイレもあり。",
    tags: "駐車場有・トイレ有・初心者向き"
  },
  {
    id: "yamaki",
    name: "門和佐川（支流）山喜建設（北）",
    river: "門和佐川",
    lat: 35.7201237, lng: 137.204829,
    image: "yamaki.jpg",
    pdf: "yamaki.pdf",
    desc: "競争率低め、穴場ポイント。駐車は未舗装部分のみ可。※舗装部分は私有地のため駐車禁止。",
    tags: "駐車場有・トイレ有（車で2分）・初心者向き"
  },
  {
    id: "kadowasagoryu",
    name: "門和佐川（支流）本流合流点",
    river: "門和佐川",
    lat: 35.7222683, lng: 137.2011067,
    image: "kadowasagoryu.jpg",
    pdf: "kadowasagoryu.pdf",
    desc: "門和佐川の最下流部。産卵を控えた鮎が居着くポイント。シーズン後半におすすめ。",
    tags: "駐車場有・トイレ有（車で3分）・初心者向き"
  },
  {
    id: "nakaharakoh",
    name: "飛騨川　中原公民館裏",
    river: "飛騨川",
    lat: 35.726036, lng: 137.1991328,
    image: "nakaharakoh.jpg",
    pdf: "nakaharakoh.pdf",
    desc: "終盤の大鮎釣りの人気ポイント。お盆には尺鮎が出た実績あり。シーズン後半にもおすすめ。",
    tags: "駐車場有・トイレ有（車で2分）"
  },
  {
    id: "nakaharahoiku",
    name: "飛騨川　旧中原保育園裏",
    river: "飛騨川",
    lat: 35.7289316, lng: 137.1973007,
    image: "nakaharahoiku.jpg",
    pdf: "nakaharahoiku.pdf",
    desc: "旧「中原保育園」の裏手。お盆には尺鮎が出た実績あり。終盤の大鮎釣りの人気ポイント。",
    tags: "駐車場有・トイレ有（車で3分）"
  }
];

/* ===================== 地図初期化 ===================== */
const map = L.map('map', { scrollWheelZoom: true }).setView([35.83, 137.22], 11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
  maxZoom: 19
}).addTo(map);

/* コンテナのサイズ確定タイミングによって地図が「世界表示」になってしまう
   Leafletの既知の挙動を防ぐため、読み込み完了後とリサイズ時にサイズを再計算する */
function fixMapSize(){ map.invalidateSize(); }
window.addEventListener('load', fixMapSize);
window.addEventListener('resize', fixMapSize);
setTimeout(fixMapSize, 300);

function makeIcon(active, number){
  return L.divIcon({
    className: '',
    html: `<div style="
      width:28px;height:28px;border-radius:50% 50% 50% 0;
      background:${active ? '#d97b3f' : '#1f4a52'};
      transform:rotate(-45deg);
      border:2px solid #fff;
      box-shadow:0 1px 4px rgba(0,0,0,.35);
      display:flex;align-items:center;justify-content:center;
    "><span style="
      transform:rotate(45deg);
      color:#fff;font-weight:700;font-size:13px;
      font-family:'Noto Sans JP',sans-serif;
    ">${number}</span></div>`,
    iconSize: [28,28],
    iconAnchor: [14,28],
    popupAnchor: [0,-26]
  });
}

const BASE_URL = "https://mashitariver-ayulureguide.github.io/ayulure-map/";

const markers = {};
const spotNumberById = {};
SPOTS.forEach((spot, i) => {
  spotNumberById[spot.id] = i + 1;
  const marker = L.marker([spot.lat, spot.lng], { icon: makeIcon(false, i + 1) }).addTo(map);
  const imageHtml = spot.image
    ? `<img src="${spot.image}" alt="${spot.name}" class="popup-image">`
    : '';
  const pdfHtml = spot.pdf
    ? `<a href="${spot.pdf}" target="_blank" rel="noopener noreferrer" class="popup-pdf-link">詳しく見る（PDF）</a>`
    : '';
  const mapsHtml = `<a href="#" class="popup-maps-link" data-lat="${spot.lat}" data-lng="${spot.lng}">現在地からのルート（車）</a>`;
  const homeHtml = `<a href="${BASE_URL}" class="popup-home-link">全体図に戻る</a>`;
  marker.bindPopup(
    `${imageHtml}
     <p class="popup-title">${spot.name}</p>
     <p class="popup-body">${spot.desc}</p>
     <p class="popup-tags">${spot.tags}</p>
     <div class="popup-links">${mapsHtml}${pdfHtml}${homeHtml}</div>`,
    { maxWidth: 240 }

  );
  marker.on('click', () => selectSpot(spot.id, false));
  markers[spot.id] = marker;
});

/* 「現在地からのルート」ボタン：ブラウザの位置情報から現在地を取得し、
   出発地を明示したGoogleマップのURLを組み立てる（東京など固定地点に
   飛んでしまう問題を避けるため、Google側の自動判定に頼らない） */
document.addEventListener('click', (e) => {
  const link = e.target.closest('.popup-maps-link');
  if(!link) return;
  e.preventDefault();
  const destLat = link.dataset.lat;
  const destLng = link.dataset.lng;
  const openWithOrigin = (originStr) => {
    const url = `https://www.google.com/maps/dir/?api=1${originStr}&destination=${destLat},${destLng}&travelmode=driving`;
    window.open(url, '_blank', 'noopener,noreferrer');
  };
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        openWithOrigin(`&origin=${pos.coords.latitude},${pos.coords.longitude}`);
      },
      () => {
        // 位置情報が取得できない場合は、目的地のみ指定してGoogle側の現在地判定に任せる
        openWithOrigin('');
      },
      { enableHighAccuracy: true, timeout: 8000 }
    );
  } else {
    openWithOrigin('');
  }
});

/* ===================== 右パネルのリスト生成 ===================== */
const listEl = document.getElementById('spotList');
SPOTS.forEach((spot, i) => {
  const li = document.createElement('li');
  li.className = 'spot-item';
  li.dataset.id = spot.id;
  li.innerHTML = `
    <div class="spot-badge">${i+1}</div>
    <div class="spot-text">
      <div class="name">${spot.name}</div>
    </div>`;
  li.addEventListener('click', () => selectSpot(spot.id, true));
  listEl.appendChild(li);
});

/* ===================== 選択状態の反映 ===================== */
function selectSpot(id, flyToIt){
  const spot = SPOTS.find(s => s.id === id);
  if(!spot) return;

  // ピンの見た目更新
  Object.entries(markers).forEach(([sid, m]) => {
    m.setIcon(makeIcon(sid === id, spotNumberById[sid]));
  });

  // リストのハイライト更新
  document.querySelectorAll('.spot-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  if(flyToIt){
    map.flyTo([spot.lat, spot.lng], 15, { duration: 0.8 });
  }
  markers[id].openPopup();

  // URLを書き換え（ブラウザ履歴を汚さないreplaceState）
  const url = new URL(window.location.href);
  url.searchParams.set('point', id);
  window.history.replaceState({}, '', url);
}

/* ===================== 初期表示：URLパラメータを読む ===================== */
const params = new URLSearchParams(window.location.search);
const initialId = params.get('point');

if(initialId && markers[initialId]){
  selectSpot(initialId, true);
} else {
  // パラメータが無ければ全体表示
  const bounds = L.latLngBounds(SPOTS.map(s => [s.lat, s.lng]));
  map.fitBounds(bounds.pad(0.2));
}
</script>
</body>
</html>
